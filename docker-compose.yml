services:
  podcast-recorder:
    build: .
    container_name: podcast-recorder
    restart: unless-stopped
    ports:
      - "7799:3000"
    volumes:
      - podcast-recorder-data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
      - DB_PATH=/app/data/rooms.db
      - SECRET=${SECRET}
      - SITE_PASSWORD=${SITE_PASSWORD}
      - HTTPS=${HTTPS}          # set to "true" in Portainer env vars once Nginx + SSL is live

volumes:
  podcast-recorder-data:
